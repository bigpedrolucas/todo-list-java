# ==========================================
# TASK MANAGER API - CONFIGURAÇÃO
# ==========================================
# Equivalente a settings.py do Django

spring:
  application:
    name: Task Manager API
    
  # ===== BANCO DE DADOS H2 =====
  # Equivalente a DATABASES = {'default': {...}} no Django
  datasource:
    url: jdbc:h2:mem:taskmanagerdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
    
  # ===== JPA / HIBERNATE =====
  # Equivalente a configuração do Django ORM
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      # ddl-auto: create-drop = recria DB a cada startup (dev only!)
      # Equivalente a makemigrations + migrate automático
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # Gera comentários SQL com nome das entidades
        use_sql_comments: true
        
  # ===== H2 CONSOLE =====
  # Equivalente ao Django Admin para explorar dados
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        # Permite acessar de qualquer lugar (dev only!)
        web-allow-others: true
        
  # ===== DEVTOOLS =====
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

# ===== SERVIDOR =====
# Equivalente a runserver 0.0.0.0:8000 do Django
server:
  port: 8080
  servlet:
    context-path: /
  
# ===== LOGGING =====
# Equivalente a LOGGING no settings.py do Django
logging:
  level:
    # Debug SQL queries (como Django debug mode)
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    com.taskmanager: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# ===== SPRINGDOC (SWAGGER) =====
# Equivalente a drf-spectacular settings
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  info:
    title: Task Manager API
    description: API REST para gestão de projetos e tarefas - Aprendizagem Django → Spring Boot
    version: v1.0.0
    contact:
      name: Developer
